<div class="container mt-5">

  <h2>Shopping Cart</h2>

  <table class="table table-bordered mt-4">

    <thead>

      <tr>

        <th>Name</th>

        <th>Price</th>

        <th>Category</th>

        <th></th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let item of cartItems; let i = index">

        <td>{{item.name}}</td>

        <td>₹{{item.price}}</td>

        <td>{{item.category}}</td>

        <td>

          <button class="btn btn-danger btn-sm"
                  (click)="remove(i)">

            Remove

          </button>

        </td>

      </tr>

    </tbody>

  </table>

  <h3>Total : ₹{{getTotal()}}</h3>

  <a routerLink="/checkout"
     class="btn btn-success">

    Proceed to Checkout

  </a>

</div>
