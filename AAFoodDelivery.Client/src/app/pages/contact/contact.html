<div class="container mt-5 mb-5">

  <div class="text-center mb-5">

    <img src="images/logo.png"
         width="120"
         class="mb-3">

    <h2 class="fw-bold">
      Contact Us
    </h2>

    <p class="text-muted">
      We'd love to hear from you.
    </p>

  </div>

  <div class="row">

    <div class="col-lg-5">

      <div class="card shadow-sm p-4 h-100">

        <h4 class="mb-4">
          Contact Information
        </h4>

        <p>
          📍 <strong>Address</strong><br>
          Anand & Animesh ,IITM Janakpuri, New Delhi
        </p>

        <hr>

        <p>
          📞 <strong>Phone</strong><br>
          +91 9876543210
        </p>

        <hr>

        <p>
          📧 <strong>Email</strong><br>
          support@aafooddelivery.com
        </p>

        <hr>

        <p>
          🕒 <strong>Business Hours</strong><br>
          Monday - Sunday<br>
          9:00 AM - 11:00 PM
        </p>

      </div>

    </div>

    <div class="col-lg-7">

      <div class="card shadow-sm p-4">

        <h4 class="mb-4">
          Send Us a Message
        </h4>

        <div class="mb-3">

          <label class="form-label">
            Full Name
          </label>

          <input class="form-control"
                 [(ngModel)]="contact.name">

        </div>

        <div class="mb-3">

          <label class="form-label">
            Email Address
          </label>

          <input type="email"
                 class="form-control"
                 [(ngModel)]="contact.email">

        </div>

        <div class="mb-3">

          <label class="form-label">
            Subject
          </label>

          <input class="form-control"
                 [(ngModel)]="contact.subject">

        </div>

        <div class="mb-3">

          <label class="form-label">
            Message
          </label>

          <textarea rows="5"
                    class="form-control"
                    [(ngModel)]="contact.message"></textarea>

        </div>

        <button class="btn btn-warning w-100"
                (click)="sendMessage()">

          Send Message

        </button>

      </div>

    </div>

  </div>

</div>
