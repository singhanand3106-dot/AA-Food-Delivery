<section class="hero">

  <div class="container">

    <div class="row align-items-center">

      <div class="col-lg-6">

        <h1>
          Order your favourite food
          <span>anytime, anywhere.</span>
        </h1>

        <p>
          Fast delivery • Fresh food • Best restaurants near you
        </p>

        <div class="search-box">

          <input type="text"
                 class="form-control"
                 placeholder="Search for Biryani, Pizza, Burger...">

          <button class="btn btn-warning">

            <i class="bi bi-search"></i>

          </button>

        </div>

      </div>

      <div class="col-lg-6 text-center">

        <div id="foodCarousel"
             class="carousel slide"
             data-bs-ride="carousel"
             data-bs-interval="3000">

          <div class="carousel-inner">

            <div class="carousel-item active">
              <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=900"
                   class="hero-image d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=900"
                   class="hero-image d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=900"
                   class="hero-image d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://images.unsplash.com/photo-1600891964092-4316c288032e?w=900"
                   class="hero-image d-block w-100">
            </div>

          </div>

          <button class="carousel-control-prev"
                  type="button"
                  data-bs-target="#foodCarousel"
                  data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

          </button>

          <button class="carousel-control-next"
                  type="button"
                  data-bs-target="#foodCarousel"
                  data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

          </button>

        </div>

      </div>

    </div>

  </div>

</section>


<section class="container py-5">

  <h2 class="fw-bold mb-4">
    Top Picks For You
  </h2>

  <div class="row">

    <div class="col-lg-3 col-md-6 mb-4"
         *ngFor="let food of foods">

      <div class="restaurant-card">

        <img class="restaurant-image"
             [src]="'https://placehold.co/600x400?text=' + food.name">

        <div class="p-3">

          <h5 class="fw-bold">
            {{food.name}}
          </h5>

          <div class="d-flex justify-content-between">

            <span class="rating">
              ⭐ 4.7
            </span>

            <span>
              25-30 mins
            </span>

          </div>

          <p class="text-muted mt-2">
            {{food.category}}
          </p>

          <h5 class="text-danger">
            ₹{{food.price}}
          </h5>

          <button class="btn btn-warning w-100 mt-3">
            Add to Cart
          </button>

        </div>

      </div>

    </div>

  </div>

</section>
